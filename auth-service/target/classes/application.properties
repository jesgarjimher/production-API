# Nombre del microservicio
spring.application.name=auth-service

# Puerto en el que correr� este backend en tu PC
server.port=8081

# Configuraci�n de la Base de Datos (Apunta al puerto 3306 de Docker)
spring.datasource.url=jdbc:mysql://localhost:3306/db_auth?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraci�n de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect